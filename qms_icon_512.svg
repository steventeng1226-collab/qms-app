<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring decoration -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M256 80 L380 130 L380 260 C380 330 330 390 256 420 C182 390 132 330 132 260 L132 130 Z"
        fill="url(#shield)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Inner shield fill -->
  <path d="M256 95 L368 140 L368 258 C368 322 322 376 256 404 C190 376 144 322 144 258 L144 140 Z"
        fill="#ffffff" fill-opacity="0.06"/>

  <!-- Q letter (Quality) - stylized -->
  <circle cx="240" cy="235" r="72" fill="none" stroke="#ffffff" stroke-width="22" stroke-opacity="0.9"/>
  <line x1="293" y1="278" x2="335" y2="318" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Small checkmark inside Q -->
  <polyline points="215,235 233,255 268,215" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom text area -->
  <rect x="155" y="390" width="202" height="36" rx="18" fill="#ffffff" fill-opacity="0.12"/>
  <text x="256" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="3">QMS</text>

  <!-- Corner dots decoration -->
  <circle cx="130" cy="130" r="5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="382" cy="130" r="5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="145" cy="390" r="4" fill="#60a5fa" opacity="0.4"/>
  <circle cx="367" cy="390" r="4" fill="#60a5fa" opacity="0.4"/>
</svg>
