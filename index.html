<script>
const BUILD='v2.4';

// ═══════════════════════════════════════════════
// GOOGLE SHEETS SYNC
// 部署Apps Script後填入URL
// ═══════════════════════════════════════════════
const SHEETS_URL = localStorage.getItem('qms_sheets_url') || 'https://script.google.com/macros/s/AKfycbxGROwcw5ZPIhG6qDap3fMcmTEf3jjEcBPiK-JBVK-Y9JoLQTp0ms1FT5bh4-wbk_Qh/exec';
// AI Settings
function getAISetting(k,def){return localStorage.getItem('qms_ai_'+k)||def;}
function setAISetting(k,v){localStorage.setItem('qms_ai_'+k,v);}
let syncTimer = null;
let syncStatus = 'idle'; // idle | syncing | ok | error

async function sheetsGet(action) {
  if (!SHEETS_URL) return null;
  try {
    const r = await fetch(SHEETS_URL + '?action=' + action + '&t=' + Date.now());
    return await r.json();
  } catch(e) { return null; }
}

async function sheetsPost(data) {
  if (!SHEETS_URL) return null;
  try {
    const r = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    return await r.json();
  } catch(e) { return null; }
}

async function loadFromSheets() {
  if (!SHEETS_URL || !navigator.onLine) return false;
  setSyncStatus('syncing');
  try{
    const result = await sheetsGet('load');
    if (result && Array.isArray(result.cases)) {
      if(result.cases.length > 0){
        // Sheets data WINS - replace local completely
        // Only keep local cases that don't exist in Sheets yet (truly new, not yet synced)
        const sheetIds = new Set(result.cases.map(c => c.id));
        const newLocalOnly = cases.filter(c => !sheetIds.has(c.id) && c.createdAt > (result.ts - 10000));
        cases = [...result.cases, ...newLocalOnly];
      }
      save(false);
      setSyncStatus('ok');
      return true;
    }
    setSyncStatus('error');
    return false;
  }catch(e){
    setSyncStatus('error');
    return false;
  }
}

async function syncToSheets() {
  if (!SHEETS_URL || cases.length === 0 || !navigator.onLine) return;
  setSyncStatus('syncing');
  try{
    const result = await sheetsPost({ action: 'save', cases });
    if(result && result.saved !== undefined){
      setSyncStatus('ok');
      localStorage.setItem('qms_last_sync_count', result.saved);
    }else{
      setSyncStatus('error');
      console.error('Sync failed:',result);
    }
  }catch(e){
    setSyncStatus('error');
    console.error('Sync error:',e);
  }
}

function safeRerender(){
  // Only re-render if not in the middle of form filling or case detail
  const safe=['dashboard','list','fqc','stats','yield','settings','placeholder'];
  if(!safe.includes(screen)) return; // Don't interrupt new case form or detail view
  if(screen==='dashboard') renderDashboard();
  else if(screen==='list') renderList();
  else if(screen==='fqc') renderFQC();
  else if(screen==='stats') renderStats();
  else if(screen==='yield') renderYield();
}

async function manualSync() {
  setSyncStatus('syncing');
  const pulled = await loadFromSheets();
  if (pulled) {
    safeRerender();
    setSyncStatus('ok');
  }
}

async function diagSheets(){
  if(!SHEETS_URL){alert('未設定Sheets URL');return;}
  setSyncStatus('syncing');
  try{
    const result=await sheetsGet('load');
    setSyncStatus(result?'ok':'error');
    const sheetsCount=result?.cases?.length??'錯誤';
    const localCount=cases.length;
    const msg=`診斷結果：
本機案件數：${localCount}
Sheets案件數：${sheetsCount}
Sheets時間戳：${result?.ts?new Date(result.ts).toLocaleString('zh-TW'):'無'}
${sheetsCount!==localCount?'⚠️ 數量不一致！':'✅ 數量一致'}
${Array.isArray(result?.cases)?'Sheets案件：\n'+result.cases.map(c=>`  - ${c.type} | ${c.what||c.anomalyType||c.id}`).join('\n'):''}`;
    alert(msg);
  }catch(e){setSyncStatus('error');alert('診斷失敗：'+e.message);}
}

async function pushAllToSheets(){
  if(!confirm(`確定要將本機${cases.length}筆案件全部推送到Sheets？\n這會覆蓋Sheets現有資料。`))return;
  setSyncStatus('syncing');
  try{
    const result=await sheetsPost({action:'save',cases});
    if(result&&result.saved!==undefined){
      setSyncStatus('ok');
      alert(`✅ 已推送 ${result.saved} 筆到Sheets`);
    }else{
      setSyncStatus('error');
      alert('⚠️ 推送失敗：'+(result?.error||'未知錯誤'));
    }
  }catch(e){setSyncStatus('error');alert('⚠️ 連線失敗：'+e.message);}
}

async function forceRefreshFromSheets(){
  if(!confirm('從Google Sheets完全重新載入資料？\n本機資料將被Sheets覆蓋。')) return;
  setSyncStatus('syncing');
  try{
    const result = await sheetsGet('load');
    if(result && Array.isArray(result.cases)){
      cases = result.cases;
      save(false);
      setSyncStatus('ok');
      renderDashboard();
      screen='dashboard';
      updateHdr();
      alert('✅ 已從Google Sheets完全重新載入 '+cases.length+' 筆資料');
    }else{
      setSyncStatus('error');
      alert('⚠️ 無法從Sheets載入資料');
    }
  }catch(e){setSyncStatus('error');alert('⚠️ 連線失敗：'+e.message);}
}

function schedulSync() {
  if (!SHEETS_URL) return;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToSheets, 2000);
}

function setSyncStatus(s) {
  syncStatus = s;
  if (s === 'ok') localStorage.setItem('qms_last_sync', Date.now().toString());
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const map = {idle:'', syncing:'⟳', ok:'✓', error:'⚠'};
  const col = {idle:'#64748b', syncing:'#60a5fa', ok:'#4ade80', error:'#f87171'};
  el.textContent = map[s] || '';
  el.style.color = col[s] || '#64748b';
  el.title = s === 'ok' ? '已同步 Google Sheets' : s === 'error' ? '同步失敗' : s === 'syncing' ? '同步中...' : '';
}

function promptSheetsUrl() {
  const url = prompt('請輸入 Google Apps Script Web App URL：\n（部署後從Apps Script取得）', SHEETS_URL);
  if (url && url.startsWith('https://')) {
    localStorage.setItem('qms_sheets_url', url);
    location.reload();
  }
}

// Offline detection
function updateOnlineStatus(){
  const tag=document.getElementById('offlineTag');
  const sync=document.getElementById('syncStatus');
  if(!navigator.onLine){
    if(tag) tag.style.display='inline';
    if(sync) sync.style.display='none';
  } else {
    if(tag) tag.style.display='none';
    if(sync) sync.style.display='';
  }
}
window.addEventListener('online', ()=>{updateOnlineStatus();manualSync();});
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
// Auto-sync when app becomes visible (switching from another app/tab)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && SHEETS_URL) {
    loadFromSheets().then(loaded => {
      if (loaded) safeRerender();
    });
  }
});
// Also sync when window gets focus
window.addEventListener('focus', () => {
  if (SHEETS_URL) {
    const last = parseInt(localStorage.getItem('qms_last_sync') || '0');
    if (Date.now() - last > 30000) {
      loadFromSheets().then(loaded => { if (loaded) safeRerender(); });
    }
  }
});

const DSTEPS=['D1','D2','D3','D4','D5','D6','D7','D8'];
const DLBLS={D1:'成立小組',D2:'問題描述',D3:'暫時對策',D4:'真因分析',D5:'永久對策',D6:'執行驗證',D7:'預防再發',D8:'結案確認'};

const D_DESC={
  D1:{tasks:['確認跨功能小組成員','指定8D負責人','確認案件緊急程度'],expect:'小組名單與分工'},
  D2:{tasks:['5W2H完整問題描述','確認風險批範圍','盤點庫存與在途'],expect:'問題描述文件與風險批定義'},
  D3:{tasks:['暫時遏制措施執行','確認客戶端已隔離','留底樣品綁定DC/LC'],expect:'不良品已停止流出'},
  D4:{tasks:['4M1E分析','5-Why追問','根因驗證：可再現+排除後消失'],expect:'確認根因（有驗證數據）'},
  D5:{tasks:['針對根因制定永久對策','防錯機制設計','確認對策有效性'],expect:'永久對策方案'},
  D6:{tasks:['執行永久對策','驗證對策效果','確認良率/不良率改善'],expect:'對策效果驗證數據'},
  D7:{tasks:['更新FMEA/CP/SOP','水平展開至相似製程','預防措施導入'],expect:'制度化防再發措施'},
  D8:{tasks:['確認客戶滿意','完整8D報告歸檔','經驗知識庫記錄'],expect:'客戶確認結案'},
};
let activeDPanel=null; // which D is showing panel

const DCOL={D1:'#94a3b8',D2:'#3b82f6',D3:'#d97706',D4:'#7c3aed',D5:'#dc2626',D6:'#0891b2',D7:'#16a34a',D8:'#1e3a8a'};
const PHOTO_LABELS=['不良品外觀','顯微鏡照','截面分析','EDX報告','對照良品','客戶提供','其他'];
const DEFAULT_CL=[
  {id:'CL01',cat:'客戶端',item:'客戶端風險品已隔離（停線/停用）'},
  {id:'CL02',cat:'客戶端',item:'客戶庫存數量確認'},
  {id:'CL03',cat:'客戶端',item:'在制品（已組裝）數量確認'},
  {id:'CL04',cat:'客戶端',item:'換貨/補貨數量與時程安排'},
  {id:'CL05',cat:'客戶端',item:'客戶線體斷線風險確認'},
  {id:'CL06',cat:'客戶端',item:'不良品寄回廠分析'},
  {id:'CL07',cat:'客戶端',item:'客戶焊接條件/製程參數確認'},
  {id:'CL08',cat:'客戶端',item:'客戶後續使用狀況了解'},
  {id:'CL09',cat:'客戶端',item:'客戶EDX/FA報告取得'},
  {id:'CL10',cat:'廠內端',item:'風險批範圍定義（起點/終點/連續或間歇）'},
  {id:'CL11',cat:'廠內端',item:'廠內庫存盤點完成'},
  {id:'CL12',cat:'廠內端',item:'WIP（在製品）確認'},
  {id:'CL13',cat:'廠內端',item:'HUB倉/在途庫存確認'},
  {id:'CL14',cat:'廠內端',item:'留底樣品取得（DC/LC綁定）'},
  {id:'CL15',cat:'廠內端',item:'外觀分析完成'},
  {id:'CL16',cat:'廠內端',item:'EDX分析安排'},
  {id:'CL17',cat:'廠內端',item:'外檢機100%導入確認'},
  {id:'CL18',cat:'廠內端',item:'水平展開評估'},
];

// ── State ─────────────────────────────────────────────────

async function apiCall(sys,msgs,maxTok){
  const provider=getAISetting('provider','claude');
  if(provider==='gemini') return callGemini(sys,msgs,maxTok);
  return callClaude(sys,msgs,maxTok);
}

async function callClaude(sys,msgs,maxTok){
  const key=getAISetting('claude_key','');
  if(!key) return'⚠️ 請到「⚙ 設定」輸入 Claude API Key';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||1000,system:sys,messages:msgs})
    });
    const d=await r.json();
    if(d.error) return'⚠️ Claude錯誤：'+d.error.message;
    return(d.content?.[0]?.text||'').trim()||'⚠️ AI未回應';
  }catch(e){return'⚠️ Claude連線失敗：'+e.message;}
}

async function callGemini(sys,msgs,maxTok){
  const key=getAISetting('gemini_key','');
  if(!key) return'⚠️ 請到「⚙ 設定」輸入 Gemini API Key';
  try{
    // Convert messages to Gemini format
    const contents=msgs.map(m=>({
      role:m.role==='assistant'?'model':'user',
      parts:[{text:typeof m.content==='string'?m.content:m.content.map(c=>c.text||'').join('')}]
    }));
    if(sys) contents.unshift({role:'user',parts:[{text:sys}]},{role:'model',parts:[{text:'了解，我會依照這個角色和規則回應。'}]});
    const model=getAISetting('gemini_model','gemini-1.5-flash');
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents,generationConfig:{maxOutputTokens:maxTok||1000}})
    });
    const d=await r.json();
    if(d.error){
      const msg=d.error.message||'';
      if(msg.includes('quota')||msg.includes('limit'))
        return'⚠️ Gemini配額已達上限，請到設定切換模型（試試 gemini-1.5-flash）或等候後重試';
      if(msg.includes('API_KEY')||msg.includes('key'))
        return'⚠️ Gemini API Key無效，請到設定重新輸入';
      return'⚠️ Gemini錯誤：'+msg;
    }
    return d.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||'⚠️ Gemini未回應';
  }catch(e){return'⚠️ Gemini連線失敗：'+e.message;}
}

async function callPaste(text,imgs,ctx){
  const info=ctx?'\n【案件】'+ctx.what+'|'+ctx.who+'|DC:'+ctx.when:'';
  const msgContent=imgs&&imgs.length
    ?[{type:'text',text:text||'請分析圖片'},...imgs.map(i=>{const p=i.split(',');return{type:'image',source:{type:'base64',media_type:p[0].split(':')[1].split(';')[0],data:p[1]}};})]
    :(text||'');
  // Step 1: plain text analysis
  const analysisText=await apiCall(ANALYSIS_SYS+info,[{role:'user',content:msgContent}],1200);
  // Step 2: silent JSON extraction
  let tl=[],pd=[],aa='',flags=[];
  try{
    const raw=await apiCall(STRUCT_SYS,[{role:'user',content:analysisText}],600);
    function tryJ(s){try{return JSON.parse(s);}catch(e){return null;}}
    const j=tryJ(raw)||(()=>{const a=raw.indexOf('{'),b=raw.lastIndexOf('}');return a>=0&&b>a?tryJ(raw.slice(a,b+1)):null;})();
    if(j){tl=j.tl||[];pd=j.pd||[];aa=j.aa||'';flags=j.fl||[];}
  }catch(e){}
  return{analysisText,tl,pd,aa,flags};
}

async function callDiscuss(msgs,ctx){
  const info=ctx?'\n【案件】'+ctx.what+'|'+ctx.who+'|DC:'+ctx.when+'|進度:'+(ctx.currentD||'D1'):'';
  return apiCall(DISCUSS_SYS+info,msgs,1000);
}

// ── Image handling ─────────────────────────────────────────
document.addEventListener('paste',e=>{
  if(screen!=='detail')return;
  Array.from(e.clipboardData?.items||[]).forEach(item=>{
    if(item.type.startsWith('image/')){
      const r=new FileReader();r.onload=ev=>compress(ev.target.result,d=>{pasteImgs.push(d);renderPrev();});
      r.readAsDataURL(item.getAsFile());}});});
function handleFile(e){Array.from(e.target.files||[]).forEach(f=>{const r=new FileReader();r.onload=ev=>compress(ev.target.result,d=>{pasteImgs.push(d);renderPrev();});r.readAsDataURL(f);});e.target.value='';}
function compress(dataUrl,cb){const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const MAX=600;let w=img.width,h=img.height;if(w>MAX){h=h*(MAX/w);w=MAX;}if(h>MAX){w=w*(MAX/h);h=MAX;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.7));};img.src=dataUrl;}
function renderPrev(){const el=document.getElementById('imgPreview');if(!el)return;el.innerHTML=pasteImgs.map((img,i)=>`<div class="img-thumb"><img src="${img}"/><button class="img-rm2" onclick="rmImg(${i})">×</button></div>`).join('');el.style.display=pasteImgs.length?'flex':'none';}
function rmImg(i){pasteImgs.splice(i,1);renderPrev();}
function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>compress(ev.target.result,d=>{const c=getCur();if(!c)return;c.photos=[...(c.photos||[]),{data:d,label:photoLabel,ts:Date.now()}];save();renderDetail();});r.readAsDataURL(f);e.target.value='';}

function dBarHTML(currentD,closed){return'<div class="dbar">'+DSTEPS.map(d=>{const idx=DSTEPS.indexOf(d),cur=DSTEPS.indexOf(currentD),done=closed||idx<cur,active=d===currentD&&!closed,selected=activeDPanel===d;return`<div class="dseg" style="background:${done?DCOL[d]:active?DCOL[d]+'28':'#f1f5f9'};border:${selected?`2px solid ${DCOL[d]}`:(active?`1.5px solid ${DCOL[d]}`:'1.5px solid transparent')};color:${done?'#fff':active?DCOL[d]:'#94a3b8'};cursor:pointer;outline:${selected?'2px solid white':''}" onclick="toggleDPanel('${d}')" title="點擊查看${d}內容">${d}</div>`;}).join('')+'</div>';}
function statusBadge(c){if(c.closed)return'<span class="badge" style="background:#6b728020;color:#6b7280">已結案</span>';if(c.type==='fqc1'||c.type==='fqc2'||c.type==='ipqc'){const col=c.recurrence==='是'?'#dc2626':c.trackStatus==='closed'?'#16a34a':'#d97706';return`<span class="badge" style="background:${col}20;color:${col}">${c.type==='ipqc'&&c.recurrence==='是'?'⚠️再發':c.trackStatus==='closed'?'已結案':'追蹤中'}</span>`;}if(c.type==='yield'){const col=c.trend==='down'?'#dc2626':'#16a34a';return`<span class="badge" style="background:${col}18;color:${col}">${c.trend==='down'?'↓下降分析':'↑改善分析'}</span>`;}const col=DCOL[c.currentD]||'#94a3b8';return`<span class="badge" style="background:${col}20;color:${col}">${c.currentD} ${DLBLS[c.currentD]}</span>`;}
function priBadge(p){const m={high:['#dc2626','高'],mid:['#d97706','中'],medium:['#d97706','中'],low:['#16a34a','低']};const[col,lbl]=m[p]||['#94a3b8','—'];return`<span class="badge" style="background:${col}18;color:${col};font-size:10px">${lbl}</span>`;}
function dcDisplay(c){
  const dc=c.when||c.riskBatch?.start||'-';
  const d=parseFloat(c.defectCount);
  const n=parseFloat(c.inputCount);
  if(!isNaN(d)&&d>0&&!isNaN(n)&&n>0)
    return`${dc}(${d}/${Number(n).toLocaleString()})`;
  if(!isNaN(d)&&d>0)
    return`${dc}(${d}pcs)`;
  return dc;
}

function ppmStr(c){if(c.defectCount&&c.inputCount){const p=Math.round((parseFloat(c.defectCount)/parseFloat(c.inputCount))*1000000);return`<span style="color:${p>1000?'#dc2626':p>100?'#d97706':'#16a34a'};font-weight:500">${p.toLocaleString()} ppm</span>`;}return c.defectCount?c.defectCount+' pcs':'';}

function fld(lbl,key,ph,multi=false){return`<div class="field"><label class="lbl">${lbl}</label>${multi?`<textarea class="inp" id="f_${key}" rows="2" style="resize:none" placeholder="${ph}"></textarea>`:`<input class="inp" id="f_${key}" placeholder="${ph}"/>`}</div>`;}

function renderStep1(){
  document.getElementById('content').innerHTML=`
    <div style="display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:12px"><button class="step-tab active">1. 5W2H 問題描述</button><button class="step-tab">2. 風險批定義</button></div>
    <div class="card info-tip" style="margin-bottom:12px">
      <strong>📧 快速填寫：貼入Email自動解析</strong>

    <div class="field"><label class="lbl">How Many — 不良數量</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px"><div><label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px">不良數(pcs)</label><input class="inp" id="f_defectCount" placeholder="12" oninput="calcPPM()"/></div><div><label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px">投入數(pcs)</label><input class="inp" id="f_inputCount" placeholder="50000（選填）" oninput="calcPPM()"/></div><div><label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px">PPM</label><div id="ppmD" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;font-weight:500;color:#7c3aed;text-align:center">—</div></div></div></div>
    ${fld('How Detected — 發現方式','howDetected','例：FA / SMT / IPQC')}
    <div id="s1err" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#dc2626"></div>

}

function calcPPM(){const dRaw=document.getElementById('f_defectCount')?.value||'';const nRaw=document.getElementById('f_inputCount')?.value||'';const d=parseFloat(dRaw),n=parseFloat(nRaw),el=document.getElementById('ppmD');if(!el)return;if(!isNaN(d)&&!isNaN(n)&&n>0){const p=Math.round((d/n)*1e6);el.textContent=p.toLocaleString()+' ppm';el.style.color=p>1000?'#dc2626':p>100?'#d97706':'#16a34a';}else if(!isNaN(d)&&d>0){el.textContent=d+' pcs';el.style.color='#64748b';}else{el.textContent='—';el.style.color='#94a3b8';}}

async function autoFill(){
  const email=document.getElementById('emailPaste').value.trim();if(!email)return;
  const btn=document.getElementById('autoBtn'),msg=document.getElementById('autoMsg');
  btn.disabled=true;btn.textContent='解析中...';msg.style.display='block';msg.style.color='#0284c7';msg.textContent='AI正在解析...';
  try{
    const raw=await apiCall('從email提取資訊，只輸出JSON：{"what":"不良現象","where":"發現地點","when":"DC數字","which":"產品型號","who":"客戶名稱","defectCount":"不良數字","inputCount":"投入數字","howDetected":"發現方式"}',[{role:'user',content:email}],300);
    function tryJ(s){try{return JSON.parse(s);}catch{return null;}}
    const j=tryJ(raw)||(()=>{const a=raw.indexOf('{'),b=raw.lastIndexOf('}');return a>=0&&b>a?tryJ(raw.slice(a,b+1)):null;})();
    if(j){let n=0;Object.entries(j).forEach(([k,v])=>{if(v&&v!=='未知'){formData[k]=v;const el=document.getElementById('f_'+k);if(el){el.value=v;el.style.borderColor='#16a34a';n++;}}});msg.style.color='#16a34a';msg.textContent='✅ 已填寫'+n+'個欄位，請確認後繼續';}
    else{msg.style.color='#dc2626';msg.textContent='⚠️ 解析失敗，請手動填寫';}
  }catch(e){msg.style.color='#dc2626';msg.textContent='⚠️ 連線失敗';}
  btn.disabled=false;btn.textContent='✨ AI自動解析填寫';}

function step1Next(){

  formData.inputCount=document.getElementById('f_inputCount')?.value.trim()||'';
  const miss=[];if(!formData.what)miss.push('What（不良現象）');if(!formData.when)miss.push('When（DC）');if(!formData.which)miss.push('Which（產品型號）');if(!formData.who)miss.push('Who（客戶）');
  if(miss.length){const el=document.getElementById('s1err');el.style.display='block';el.textContent='⚠️ 必填：'+miss.join('・');return;}
  formStep=2;renderStep2();updateHdr();}

function renderStep2(){
  const r=formData;
  document.getElementById('content').innerHTML=`
    <div style="display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:12px"><button class="step-tab" onclick="formStep=1;renderStep1();updateHdr()">1. 5W2H 問題描述</button><button class="step-tab active">2. 風險批定義</button></div>

    <div class="field"><label class="lbl">風險批起始 DC（可先跳過）</label><input class="inp" id="f_rS" value="${r.riskStart}" placeholder="例：2604"/></div>
    <div class="field"><label class="lbl">風險批結束 DC（可先跳過）</label><input class="inp" id="f_rE" value="${r.riskEnd}" placeholder="例：2614"/></div>
    <div class="field"><label class="lbl">不良類型</label><div style="display:flex;gap:8px">${['continuous','intermittent'].map((v,i)=>`<button onclick="formData.riskType='${v}';renderStep2()" style="flex:1;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;border:${r.riskType===v?`1.5px solid ${v==='continuous'?'#dc2626':'#d97706'}`:'1px solid #cbd5e1'};background:${r.riskType===v?v==='continuous'?'#fef2f2':'#fffbeb':'#fff'};color:${r.riskType===v?v==='continuous'?'#dc2626':'#d97706':'#64748b'}">${['連續性','間歇性'][i]}</button>`).join('')}</div></div>
    <div class="field"><label class="lbl">暫定處置方式</label>${[{v:'hold',l:'暫停出貨（高風險）',c:'#dc2626'},{v:'screen',l:'全數篩選後出貨',c:'#d97706'},{v:'ship',l:'正常出貨（低風險）',c:'#16a34a'}].map(o=>`<button class="risk-opt" onclick="formData.riskAction='${o.v}';renderStep2()" style="border:${r.riskAction===o.v?`1.5px solid ${o.c}`:'1px solid #e2e8f0'};background:${r.riskAction===o.v?o.c+'15':'#fff'};color:${r.riskAction===o.v?o.c:'#64748b'};font-weight:${r.riskAction===o.v?500:400}">${o.l}</button>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn-g" style="flex:1;justify-content:center" onclick="formStep=1;renderStep1();updateHdr()">← 上一步</button><button class="btn-p" style="flex:2;justify-content:center;padding:10px" onclick="submitComplaint()">建立案件並開始分析</button></div>`;}

async function submitComplaint(){
  formData.riskStart=document.getElementById('f_rS')?.value.trim()||'';
  formData.riskEnd=document.getElementById('f_rE')?.value.trim()||'';

async function fqcAutoFill(){
  const text=document.getElementById('fqcPaste')?.value.trim();if(!text)return;
  const btn=document.getElementById('fqcAutoBtn'),msg=document.getElementById('fqcAutoMsg');
  btn.disabled=true;btn.textContent='解析中...';msg.style.display='block';msg.style.color='#0284c7';msg.textContent='AI解析中...';
  try{
    const raw=await apiCall(FQC_FILL_SYS,[{role:'user',content:text}],400);
    function tryJ(s){try{return JSON.parse(s);}catch{return null;}}
    const j=tryJ(raw)||(()=>{const a=raw.indexOf('{'),b=raw.lastIndexOf('}');return a>=0&&b>a?tryJ(raw.slice(a,b+1)):null;})();
    if(j){
      const map={wk:'ff_wk',date:'ff_date',series:'ff_series',product:'ff_product',batch:'ff_batch',anomalyType:'ff_anomalyType',anomalyDetail:'ff_detail',owner:'ff_owner',inspCount:'ff_insp',defectCount:'ff_def',defectRate:'ff_rate',rootCause:'ff_cause',countermeasure:'ff_action',dueDate:'ff_due'};
      let n=0;
      Object.entries(j).forEach(([k,v])=>{
        if(v&&v!=='未知'&&v!=='null'){
          if(k==='handling'&&['重檢','報廢','特采'].includes(v)){fqcForm.handling=v;n++;}
          else if(k==='recurrence'&&['是','否'].includes(v)){fqcForm.recurrence=v;n++;}
          else if(map[k]){const el=document.getElementById(map[k]);if(el){el.value=v;el.style.borderColor='#16a34a';n++;}}
        }});
      msg.style.color='#16a34a';msg.textContent='✅ 已填寫'+n+'個欄位，請確認後提交';
      document.getElementById('fqcPaste').value='';
      if(j.handling)renderNewFqc();
    }else{msg.style.color='#dc2626';msg.textContent='⚠️ 解析失敗，請手動填寫';}
  }catch(e){msg.style.color='#dc2626';msg.textContent='⚠️ 連線失敗';}
  btn.disabled=false;btn.textContent='✨ AI自動解析填寫';}

async function sendPaste(){
  const input=document.getElementById('chatInput');
  const text=(input?.value||'').trim();if(!text&&!pasteImgs.length)return;
  const c=getCur();if(!c)return;
  const userMsg={role:'user',content:text,images:[...pasteImgs],ts:Date.now(),dStep:getCur()?.currentD};
  c.messages=[...(c.messages||[]),userMsg];save();
  pasteImgs=[];if(input)input.value='';
  renderDetail();
  await doPaste(text,userMsg.images,c);}

async function doPaste(text,imgs,c){
  isLoading=true;renderDetail();
  try{
    const {analysisText,tl,pd,aa,flags}=await callPaste(text,imgs,c);
    let flagMsg='';
    if(flags.includes('wc'))flagMsg+='\n\n⚠️ 【對策警示】宣導/訓練類對策→換新員工還會發生嗎？若會，需改製程/設備/防錯機制。';
    if(flags.includes('ct'))flagMsg+='\n\n⚠️ 【數據矛盾】偵測到相互矛盾說法，已加入待確認清單。';
    if(flags.includes('ra'))flagMsg+='\n\n🚨 【重大風險】庫存或出貨風險，建議立即確認範圍。';
    const aiMsg={role:'assistant',content:analysisText+flagMsg,ts:Date.now(),dStep:c.currentD};
    c.messages=[...(c.messages||[]),aiMsg];
    // Update timeline
    const existTL=new Set((c.timeline||[]).map(t=>t.e||t.event));
    tl.forEach(t=>{if(!(existTL.has(t.e)))c.timeline=[...(c.timeline||[]),{...t,ts:Date.now()}];});
    // Update pending
    pd.forEach(p=>{c.pending=[...(c.pending||[]),{id:'P'+Date.now()+Math.random().toString(36).slice(2),item:p.i||p.item,owner:p.o||p.owner||'',priority:p.p||p.priority||'medium',confirmed:false,result:'',ts:Date.now()}];});
    // Update AI assessment
    if(aa){c.aiAssessment=aa;c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'📊 根因評估更新：\n'+aa,ts:Date.now()}];}
    save();
  }catch(e){c.messages=[...(c.messages||[]),{role:'assistant',content:'⚠️ AI連線失敗，請稍後再試',ts:Date.now()}];save();}
  isLoading=false;renderDetail();}

async function sendDiscuss(){
  const input=document.getElementById('discussInput');const text=(input?.value||'').trim();if(!text)return;
  const c=getCur();if(!c)return;
  const userMsg={role:'user',content:text,ts:Date.now()};
  c.aiDiscussion=[...(c.aiDiscussion||[]),userMsg];save();if(input)input.value='';
  renderDetail();isLoading=true;renderDetail();
  try{
    const apiMsgs=(c.aiDiscussion||[]).map(m=>({role:m.role,content:m.content}));
    const reply=await callDiscuss(apiMsgs,c);
    c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:reply,ts:Date.now()}];save();
  }catch{c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'⚠️ 連線失敗',ts:Date.now()}];save();}
  isLoading=false;renderDetail();}

// FQC Auto-fill system prompt
const FQC_FILL_SYS='從以下FQC記錄文字提取資訊，只輸出JSON（不含其他文字）：{"wk":"週次如WK18","date":"YYYY-MM-DD","series":"系列如T850/06","product":"料號","batch":"批次LC","anomalyType":"異常項目","anomalyDetail":"詳細描述","owner":"責任人","inspCount":"抽檢數字","defectCount":"不良數字","defectRate":"不良率數字","handling":"重檢或報廢或特采","rootCause":"原因","countermeasure":"對策","recurrence":"是或否"}';

const IPQC_FILL_SYS='從以下IPQC巡檢記錄文字提取資訊，只輸出JSON：{"wk":"週次","auditDate":"YYYY-MM-DD","ref":"參照品類","defectCat":"缺失分類","station":"站別","defectItem":"缺失項目詳細","owner":"責任人","rootCause":"原因分析","countermeasure":"改善對策","dueDate":"YYYY-MM-DD","recurrence":"是或否"}';
// ── IPQC Module ───────────────────────────────────────────
function emptyIpqcForm(){
  return{wk:'',auditDate:'',ref:'',defectCat:'',station:'',defectItem:'',owner:'',rootCause:'',countermeasure:'',dueDate:'',recurrence:'否'};}

let ipqcForm=emptyIpqcForm();

  document.getElementById('content').innerHTML=`
    <div class="card" style="background:#fffbeb;border-color:#fde68a;margin-bottom:12px">
      <p style="font-size:12px;color:#d97706;font-weight:500">IPQC 巡檢異常・連續3次巡檢無再發可結案</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px">
      <div><label class="lbl">WK週次</label><input class="inp" id="ip_wk" value="${esc(f.wk)}" placeholder="WK18"/></div>
      <div><label class="lbl">稽核日期</label><input class="inp" id="ip_date" type="date" value="${f.auditDate}"/></div>
    </div>
    <div class="field"><label class="lbl">參照/品類</label><input class="inp" id="ip_ref" value="${esc(f.ref)}" placeholder="產品系列或料號"/></div>
    <div class="field"><label class="lbl">缺失分類 *</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${cats.map(c=>`<button onclick="ipqcForm.defectCat='${c}';renderNewIpqc()" style="padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;border:${f.defectCat===c?'1.5px solid #1d4ed8':'1px solid #cbd5e1'};background:${f.defectCat===c?'#eff6ff':'#fff'};color:${f.defectCat===c?'#1d4ed8':'#64748b'}">${c}</button>`).join('')}</div>
    </div>
    <div class="field"><label class="lbl">站別 *</label><input class="inp" id="ip_station" value="${esc(f.station)}" placeholder="外檢站 / 焊接站 / 成型站"/></div>
    <div class="field"><label class="lbl">缺失項目 *</label><textarea class="inp" id="ip_item" rows="3" style="resize:none" placeholder="描述觀察到的異常...">${esc(f.defectItem)}</textarea></div>
    <div class="field"><label class="lbl">責任人</label><input class="inp" id="ip_owner" value="${esc(f.owner)}" placeholder="姓名"/></div>
    <div class="field"><label class="lbl">原因分析</label><textarea class="inp" id="ip_cause" rows="2" style="resize:none" placeholder="初步原因分析...">${esc(f.rootCause)}</textarea></div>
    <div class="field"><label class="lbl">改善對策</label><textarea class="inp" id="ip_action" rows="2" style="resize:none" placeholder="已採取或計畫的改善措施...">${esc(f.countermeasure)}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px">
      <div><label class="lbl">完成日期</label><input class="inp" id="ip_due" type="date" value="${f.dueDate}"/></div>
      <div><label class="lbl">是否再發</label>
        <div style="display:flex;gap:6px;margin-top:4px">
          ${['是','否'].map(v=>`<button onclick="ipqcForm.recurrence='${v}';renderNewIpqc()" style="flex:1;padding:7px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;border:${f.recurrence===v?`1.5px solid ${v==='是'?'#dc2626':'#16a34a'}`:'1px solid #cbd5e1'};background:${f.recurrence===v?v==='是'?'#fef2f2':'#f0fdf4':'#fff'};color:${f.recurrence===v?v==='是'?'#dc2626':'#16a34a':'#64748b'}">${v}</button>`).join('')}

async function ipqcAutoFill(){
  const text=document.getElementById('ipPaste')?.value.trim();if(!text)return;
  const btn=document.getElementById('ipAutoBtn'),msg=document.getElementById('ipAutoMsg');
  btn.disabled=true;btn.textContent='解析中...';msg.style.display='block';msg.style.color='#0284c7';msg.textContent='AI解析中...';
  try{
    const raw=await apiCall(IPQC_FILL_SYS,[{role:'user',content:text}],400);
    function tryJ(s){try{return JSON.parse(s);}catch{return null;}}
    const j=tryJ(raw)||(()=>{const a=raw.indexOf('{'),b=raw.lastIndexOf('}');return a>=0&&b>a?tryJ(raw.slice(a,b+1)):null;})();
    if(j){
      const map={wk:'ip_wk',auditDate:'ip_date',ref:'ip_ref',station:'ip_station',defectItem:'ip_item',owner:'ip_owner',rootCause:'ip_cause',countermeasure:'ip_action',dueDate:'ip_due'};
      let n=0;
      Object.entries(j).forEach(([k,v])=>{
        if(v&&v!=='未知'){
          if(k==='defectCat'){ipqcForm.defectCat=v;n++;}
          else if(k==='recurrence'&&['是','否'].includes(v)){ipqcForm.recurrence=v;n++;}
          else if(map[k]){const el=document.getElementById(map[k]);if(el){el.value=v;el.style.borderColor='#16a34a';n++;}}
        }});
      msg.style.color='#16a34a';msg.textContent='✅ 已填寫'+n+'個欄位，請確認後提交';
      document.getElementById('ipPaste').value='';
      if(j.defectCat||j.recurrence)renderNewIpqc();
    }else{msg.style.color='#dc2626';msg.textContent='⚠️ 解析失敗，請手動填寫';}
  }catch(e){msg.style.color='#dc2626';msg.textContent='⚠️ 連線失敗';}
  btn.disabled=false;btn.textContent='✨ AI自動解析填寫';}


async function submitIpqc(){
  const g=id=>document.getElementById('ip_'+id)?.value.trim()||'';
  Object.assign(ipqcForm,{wk:g('wk'),auditDate:g('date'),ref:g('ref'),station:g('station'),defectItem:g('item'),owner:g('owner'),rootCause:g('cause'),countermeasure:g('action'),dueDate:g('due')});
  if(!ipqcForm.defectCat){alert('請選擇缺失分類');return;}
  if(!ipqcForm.station||!ipqcForm.defectItem){alert('請填寫站別和缺失項目');return;}
  const nc={id:genId(),type:'ipqc',createdAt:Date.now(),closed:false,trackStatus:'tracking',
    wk:ipqcForm.wk,auditDate:ipqcForm.auditDate,ref:ipqcForm.ref,defectCat:ipqcForm.defectCat,
    station:ipqcForm.station,defectItem:ipqcForm.defectItem,owner:ipqcForm.owner,
    rootCause:ipqcForm.rootCause,countermeasure:ipqcForm.countermeasure,dueDate:ipqcForm.dueDate,
    recurrence:ipqcForm.recurrence,trackCount:0,
    photos:[],messages:[],timeline:[],pending:[],aiDiscussion:[],aiAssessment:'',checklistState:{}};
  cases.unshift(nc);save();curId=nc.id;screen='detail';activeTab='paste';renderDetail();updateHdr();
  // Auto-detect weak countermeasure
  const isWeak=nc.countermeasure&&/宣導|訓練|教育|注意|提醒|提示|培訓/.test(nc.countermeasure);
  const isRecur=nc.recurrence==='是';
  const initText=`IPQC巡檢異常：${nc.defectCat} | ${nc.station} | ${nc.wk} | ${nc.defectItem}
責任人：${nc.owner}
原因：${nc.rootCause||'未填'}
對策：${nc.countermeasure||'未填'}
是否再發：${nc.recurrence}`;
  await doPaste(initText,[],nc);}

let yieldImgs=[];

}

function renderNewYield(){
  yieldImgs=[];
  document.getElementById('content').innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <p style="font-size:13px;font-weight:500;color:#0f172a;margin-bottom:8px">📊 新增良率分析</p>
      <div class="field"><label class="lbl">分析標題</label><input class="inp" id="yt_title" placeholder="例：VN_LM 良率趨勢 2025-2026"/></div>
      <div class="field"><label class="lbl">時間範圍</label><input class="inp" id="yt_period" placeholder="例：2025-01 ~ 2026-05"/></div>
      <div class="field"><label class="lbl">趨勢方向</label>
        <div style="display:flex;gap:8px">
          <button id="yt_down" onclick="document.getElementById('yt_down').style.background='#fef2f2';document.getElementById('yt_down').style.color='#dc2626';document.getElementById('yt_down').style.borderColor='#dc2626';document.getElementById('yt_up').style.background='#fff';document.getElementById('yt_up').style.color='#64748b';document.getElementById('yt_up').style.borderColor='#cbd5e1'" style="flex:1;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;border:1px solid #cbd5e1;background:#fff;color:#64748b">↓ 下降趨勢</button>
          <button id="yt_up" onclick="document.getElementById('yt_up').style.background='#f0fdf4';document.getElementById('yt_up').style.color='#16a34a';document.getElementById('yt_up').style.borderColor='#16a34a';document.getElementById('yt_down').style.background='#fff';document.getElementById('yt_down').style.color='#64748b';document.getElementById('yt_down').style.borderColor='#cbd5e1'" style="flex:1;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;border:1px solid #cbd5e1;background:#fff;color:#64748b">↑ 改善趨勢</button>
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <p style="font-size:12px;font-weight:500;color:#64748b;margin-bottom:8px">📷 貼入良率趨勢圖</p>
      <div id="yImgPrev" style="display:none;margin-bottom:8px"></div>
      <div style="border:2px dashed #cbd5e1;border-radius:8px;padding:24px;text-align:center;cursor:pointer" onclick="document.getElementById('yImgFile').click()">
        <p style="font-size:13px;color:#94a3b8">點擊上傳圖片<br>或 Ctrl+V 貼上截圖</p>
      </div>
      <input type="file" id="yImgFile" accept="image/*" style="display:none" onchange="addYieldImg(event)"/>
    </div>
    <button class="btn-p" style="width:100%;justify-content:center;padding:10px;background:#16a34a" onclick="submitYield()">建立良率分析並讓AI解讀</button>`;

  // Handle paste for yield images
  const yPaste=e=>{Array.from(e.clipboardData?.items||[]).forEach(item=>{if(item.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>compress(ev.target.result,d=>{yieldImgs.push(d);renderYieldImgPrev();});r.readAsDataURL(item.getAsFile());}});};
  document.addEventListener('paste',yPaste);
  window._yPasteHandler=yPaste;}

function addYieldImg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>compress(ev.target.result,d=>{yieldImgs.push(d);renderYieldImgPrev();});r.readAsDataURL(f);e.target.value='';}
function renderYieldImgPrev(){const el=document.getElementById('yImgPrev');if(!el)return;el.innerHTML=yieldImgs.map((img,i)=>`<div style="position:relative;display:inline-block;margin-right:5px"><img src="${img}" style="max-width:200px;border-radius:6px"/><button onclick="yieldImgs.splice(${i},1);renderYieldImgPrev()" style="position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:#dc2626;border:none;color:#fff;font-size:9px;cursor:pointer">×</button></div>`).join('');el.style.display=yieldImgs.length?'block':'none';}

async function submitYield(){
  const title=document.getElementById('yt_title')?.value.trim()||'良率分析';
  const period=document.getElementById('yt_period')?.value.trim()||'';
  const downBtn=document.getElementById('yt_down');
  const trend=downBtn?.style.background==='rgb(254, 242, 242)'?'down':'up';
  if(!yieldImgs.length&&!period){alert('請至少填寫時間範圍或上傳趨勢圖');return;}
  if(window._yPasteHandler){document.removeEventListener('paste',window._yPasteHandler);delete window._yPasteHandler;}
  const nc={id:'Y'+Date.now().toString(36).toUpperCase(),type:'yield',createdAt:Date.now(),title,period,trend,closed:false,photos:[...yieldImgs.map(d=>({data:d,label:'良率趨勢圖',ts:Date.now()}))],messages:[],timeline:[],pending:[],aiDiscussion:[],aiAssessment:'',checklistState:{}};
  cases.unshift(nc);save();curId=nc.id;screen='detail';activeTab='paste';renderDetail();updateHdr();
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-yield').classList.add('active');
  const initText=`良率分析：${title}，時間範圍：${period}，趨勢：${trend==='down'?'下降':'改善'}。請分析趨勢圖，識別主要轉折點，並提出可能的變差/改善原因方向。`;
  await doPaste(initText,yieldImgs,nc);}


async function customerView(){
  const c=getCur();if(!c)return;
  // Build case summary for customer review
  const caseSummary=buildCaseSummary(c);
  const userMsg={role:'user',content:'[客戶視野分析請求]\n請以客戶SQE角度審查此8D案件。',ts:Date.now(),dStep:c.currentD};
  c.aiDiscussion=[...(c.aiDiscussion||[]),userMsg];save();
  renderDetail();isLoading=true;renderDetail();
  try{
    const reply=await apiCall(CUSTOMER_VIEW_SYS+'\n\n【案件資料】\n'+caseSummary,[{role:'user',content:'請審查此8D案件並給出客戶視角評估。案件資料：\n'+caseSummary}],1200);
    c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'👁 **客戶視野分析**\n\n'+reply,ts:Date.now()}];
    save();
  }catch(e){c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'⚠️ 分析失敗',ts:Date.now()}];save();}

async function meetingBrief(){
  const c=getCur();if(!c)return;
  const caseSummary=buildCaseSummary(c);
  const BRIEF_SYS='你是品保顧問，幫助主管在10分鐘內讓所有人方向對齊。根據案件資料，生成會議簡報框架：\n【現在確認的事實】✅\n【還不知道的事】❓\n【層別方向建議】（時間/設備/材料/人員）\n【今天會議要決定的事】□\n使用繁體中文，條列式，手機易讀。';
  const userMsg={role:'user',content:'[會議簡報請求]',ts:Date.now()};
  c.aiDiscussion=[...(c.aiDiscussion||[]),userMsg];save();
  renderDetail();isLoading=true;renderDetail();
  try{
    const reply=await apiCall(BRIEF_SYS,[{role:'user',content:'案件資料：\n'+caseSummary}],1000);
    c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'📋 **會議簡報框架**\n\n'+reply,ts:Date.now()}];
    save();
  }catch(e){c.aiDiscussion=[...(c.aiDiscussion||[]),{role:'assistant',content:'⚠️ 失敗',ts:Date.now()}];save();}
  isLoading=false;renderDetail();}

function buildCaseSummary(c){
  const msgs=(c.messages||[]).filter(m=>m.role==='assistant').slice(-5).map(m=>m.content).join('\n---\n');
  const pd=(c.pending||[]).filter(p=>!p.confirmed).map(p=>p.item||p.i||'').join('・');
  const tl=(c.timeline||[]).slice(-5).map(t=>`${t.d||t.date||''}：${t.e||t.event||''}`).join('\n');
  return `產品：${c.which||'—'} | 客戶：${c.who||'—'} | DC：${c.when||'—'} | 不良：${c.defectCount||'—'}pcs
現象：${c.what||'—'}
風險批：DC${c.riskBatch?.start||'—'}～${c.riskBatch?.end||'—'}
8D進度：${c.currentD||'D1'}
AI評估：${c.aiAssessment||'尚未評估'}
時程：\n${tl||'無'}
未結清待確認：${pd||'無'}
近期分析記錄：\n${msgs||'無'}`;}
